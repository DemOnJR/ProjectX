name: Load Test — Autoscale

on:
  workflow_dispatch:
    inputs:
      concurrency:
        description: "Parallel Playwright workers (requests in flight)"
        required: false
        default: "60"
      duration:
        description: "Test duration in seconds"
        required: false
        default: "180"

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

jobs:
  load-test:
    name: "🔥 Load Test & Scale Watch"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🔑 Authenticate to Google Cloud"
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # Use the DNS-based control plane endpoint so kubectl works from GitHub-hosted
      # runners (IAM auth). The default IP endpoint is blocked by master_authorized_networks.
      - name: "☸️  Get GKE credentials"
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GCP_CLUSTER_NAME }}
          location: ${{ secrets.GCP_REGION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          use_dns_based_endpoint: true

      - name: "📸 HPA snapshot — BEFORE"
        id: before
        run: |
          echo "### HPA before load test" | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          kubectl get hpa projectx-api -n projectx | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          REPLICAS_BEFORE=$(kubectl get deployment projectx-api -n projectx \
            -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
          echo "replicas_before=${REPLICAS_BEFORE}" >> "$GITHUB_OUTPUT"
          echo "  Replicas before: ${REPLICAS_BEFORE}"

      - name: "🐍 Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/load/requirements.txt

      - name: "📦 Install Playwright"
        run: |
          pip install -r tests/load/requirements.txt
          playwright install chromium --with-deps

      # HPA watcher must run in the SAME step as the load test: each Actions step is a
      # new shell; background jobs from a previous step are killed when that step ends.
      - name: "🔥 Run load test + HPA watch"
        env:
          APP_URL:     ${{ secrets.APP_URL }}
          CONCURRENCY: ${{ inputs.concurrency }}
          DURATION:    ${{ inputs.duration }}
        run: |
          set -euo pipefail
          (
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### HPA scaling log (during load)" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            END=$((SECONDS + DURATION + 30))
            while [ "${SECONDS}" -lt "${END}" ]; do
              TS=$(date -u +"%H:%M:%S")
              LINE=$(kubectl get hpa projectx-api -n projectx --no-headers 2>/dev/null || echo "n/a")
              PODS=$(kubectl get pods -n projectx \
                --field-selector=status.phase=Running --no-headers 2>/dev/null | wc -l)
              echo "${TS}  ${LINE}  pods_running=${PODS}" | tee -a "$GITHUB_STEP_SUMMARY"
              sleep 30
            done
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          ) &
          WATCHER_PID=$!
          trap 'kill "${WATCHER_PID}" 2>/dev/null || true; wait "${WATCHER_PID}" 2>/dev/null || true' EXIT
          python tests/load/test_autoscale.py

      - name: "📸 HPA snapshot — AFTER"
        if: always()
        id: after
        run: |
          echo "### HPA after load test" | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          kubectl get hpa projectx-api -n projectx | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          REPLICAS_AFTER=$(kubectl get deployment projectx-api -n projectx \
            -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
          echo "replicas_after=${REPLICAS_AFTER}" >> "$GITHUB_OUTPUT"
          echo "  Replicas after: ${REPLICAS_AFTER}"

      - name: "📋 Write summary"
        if: always()
        env:
          BEFORE: ${{ steps.before.outputs.replicas_before }}
          AFTER:  ${{ steps.after.outputs.replicas_after }}
        run: |
          B=0; [[ "${BEFORE:-}" =~ ^[0-9]+$ ]] && B="${BEFORE}"
          A=0; [[ "${AFTER:-}" =~ ^[0-9]+$ ]] && A="${AFTER}"
          if [ "${A}" -gt "${B}" ]; then
            SCALED="✅ Yes (+$((A - B)) replica(s))"
          else
            SCALED="➡️  No (before ${B}, after ${A})"
          fi
          {
            echo "## 🔥 Load Test Results"
            echo ""
            echo "| | |"
            echo "|:---|:---|"
            echo "| **Workers**        | ${{ inputs.concurrency }} parallel Playwright contexts |"
            echo "| **Duration**       | ${{ inputs.duration }}s |"
            echo "| **Replicas before**| \`${B}\` |"
            echo "| **Replicas after** | \`${A}\` |"
            echo "| **Auto-scaled?**   | ${SCALED} |"
            echo "| **App URL**        | (from APP_URL secret) |"
          } >> "$GITHUB_STEP_SUMMARY"
