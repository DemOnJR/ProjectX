name: Load Test — Autoscale

on:
  workflow_dispatch:
    inputs:
      concurrency:
        description: "Parallel Playwright workers (requests in flight)"
        required: false
        default: "60"
      duration:
        description: "Test duration in seconds"
        required: false
        default: "180"

permissions:
  contents: read
  id-token: write   # GitHub OIDC → Vault JWT + Workload Identity Federation

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1 · HPA BEFORE
  #     Snapshot cluster autoscaling state before traffic (requires kubectl →
  #     GKE DNS control plane, not the public app URL).
  # ────────────────────────────────────────────────────────────────────────────
  hpa-before:
    name: "📸 HPA — before"
    runs-on: ubuntu-latest
    outputs:
      replicas_before: ${{ steps.snapshot.outputs.replicas_before }}

    steps:
      - name: "🔐 Vault (JWT) — CI secrets"
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          path: ${{ secrets.VAULT_JWT_PATH }}
          role: ${{ secrets.VAULT_JWT_ROLE }}
          secrets: |
            ${{ secrets.VAULT_CI_SECRET_PATH }} wif_provider | WIF_PROVIDER
            ${{ secrets.VAULT_CI_SECRET_PATH }} gcp_service_account | GCP_SERVICE_ACCOUNT
            ${{ secrets.VAULT_CI_SECRET_PATH }} gcp_project_id | GCP_PROJECT_ID
            ${{ secrets.VAULT_CI_SECRET_PATH }} gcp_cluster_name | GCP_CLUSTER_NAME
            ${{ secrets.VAULT_CI_SECRET_PATH }} gcp_region | GCP_REGION

      - name: "🔑 Authenticate to Google Cloud"
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: "☁️ Set up gcloud"
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: ">= 450.0.0"
          project_id: ${{ env.GCP_PROJECT_ID }}
          install_components: gke-gcloud-auth-plugin

      - name: "☸️  Get GKE credentials (DNS control plane)"
        run: |
          set -euo pipefail
          echo "KUBECONFIG=${RUNNER_TEMP}/kubeconfig" >> "$GITHUB_ENV"
          export KUBECONFIG="${RUNNER_TEMP}/kubeconfig"
          gcloud container clusters get-credentials "${GCP_CLUSTER_NAME}" \
            --region "${GCP_REGION}" \
            --project "${GCP_PROJECT_ID}" \
            --dns-endpoint
          echo "kubectl API server:"
          kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}{"\n"}'

      - name: "📸 HPA snapshot — BEFORE"
        id: snapshot
        run: |
          echo "### HPA before load test" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          kubectl get hpa projectx-api -n projectx | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          REPLICAS_BEFORE=$(kubectl get deployment projectx-api -n projectx \
            -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
          echo "replicas_before=${REPLICAS_BEFORE}" >> "$GITHUB_OUTPUT"
          echo "  Replicas before: ${REPLICAS_BEFORE}"

  # ────────────────────────────────────────────────────────────────────────────
  # 2 · LOAD TEST
  #     Playwright traffic against APP_URL; HPA watcher runs in the same step
  #     so the background loop is not killed when a step ends.
  # ────────────────────────────────────────────────────────────────────────────
  load-test:
    name: "🔥 Load test + watch"
    runs-on: ubuntu-latest
    needs: hpa-before

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🔐 Vault (JWT) — CI secrets"
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          path: ${{ secrets.VAULT_JWT_PATH }}
          role: ${{ secrets.VAULT_JWT_ROLE }}
          secrets: |
            ${{ secrets.VAULT_CI_SECRET_PATH }} wif_provider | WIF_PROVIDER
            ${{ secrets.VAULT_CI_SECRET_PATH }} gcp_service_account | GCP_SERVICE_ACCOUNT
            ${{ secrets.VAULT_CI_SECRET_PATH }} gcp_project_id | GCP_PROJECT_ID
            ${{ secrets.VAULT_CI_SECRET_PATH }} gcp_cluster_name | GCP_CLUSTER_NAME
            ${{ secrets.VAULT_CI_SECRET_PATH }} gcp_region | GCP_REGION
            ${{ secrets.VAULT_CI_SECRET_PATH }} app_url | APP_URL

      - name: "🔑 Authenticate to Google Cloud"
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: "☁️ Set up gcloud"
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: ">= 450.0.0"
          project_id: ${{ env.GCP_PROJECT_ID }}
          install_components: gke-gcloud-auth-plugin

      - name: "☸️  Get GKE credentials (DNS control plane)"
        run: |
          set -euo pipefail
          echo "KUBECONFIG=${RUNNER_TEMP}/kubeconfig" >> "$GITHUB_ENV"
          export KUBECONFIG="${RUNNER_TEMP}/kubeconfig"
          gcloud container clusters get-credentials "${GCP_CLUSTER_NAME}" \
            --region "${GCP_REGION}" \
            --project "${GCP_PROJECT_ID}" \
            --dns-endpoint

      - name: "🐍 Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: tests/load/requirements.txt

      - name: "📦 Install Playwright"
        run: |
          pip install -r tests/load/requirements.txt
          playwright install chromium --with-deps

      # HPA watcher must run in the SAME step as the load test: each Actions step is a
      # new shell; background jobs from a previous step are killed when that step ends.
      - name: "🔥 Run load test + HPA watch"
        env:
          CONCURRENCY: ${{ github.event.inputs.concurrency }}
          DURATION: ${{ github.event.inputs.duration }}
        run: |
          set -euo pipefail
          (
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### HPA scaling log (during load)" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            END=$((SECONDS + DURATION + 30))
            while [ "${SECONDS}" -lt "${END}" ]; do
              TS=$(date -u +"%H:%M:%S")
              LINE=$(kubectl get hpa projectx-api -n projectx --no-headers 2>/dev/null || echo "n/a")
              PODS=$(kubectl get pods -n projectx \
                --field-selector=status.phase=Running --no-headers 2>/dev/null | wc -l)
              echo "${TS}  ${LINE}  pods_running=${PODS}" | tee -a "$GITHUB_STEP_SUMMARY"
              sleep 30
            done
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          ) &
          WATCHER_PID=$!
          trap 'kill "${WATCHER_PID}" 2>/dev/null || true; wait "${WATCHER_PID}" 2>/dev/null || true' EXIT
          python tests/load/test_autoscale.py

  # ────────────────────────────────────────────────────────────────────────────
  # 3 · HPA AFTER + RESULTS
  #     Snapshot after traffic and write the summary table (runs when the load
  #     job finished success or failure, but not when it was skipped).
  # ────────────────────────────────────────────────────────────────────────────
  hpa-after:
    name: "📸 HPA — after + summary"
    runs-on: ubuntu-latest
    needs: [hpa-before, load-test]
    if: ${{ always() && needs.hpa-before.result == 'success' && (needs.load-test.result == 'success' || needs.load-test.result == 'failure') }}
    steps:
      - name: "🔐 Vault (JWT) — CI secrets"
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          path: ${{ secrets.VAULT_JWT_PATH }}
          role: ${{ secrets.VAULT_JWT_ROLE }}
          secrets: |
            ${{ secrets.VAULT_CI_SECRET_PATH }} wif_provider | WIF_PROVIDER
            ${{ secrets.VAULT_CI_SECRET_PATH }} gcp_service_account | GCP_SERVICE_ACCOUNT
            ${{ secrets.VAULT_CI_SECRET_PATH }} gcp_project_id | GCP_PROJECT_ID
            ${{ secrets.VAULT_CI_SECRET_PATH }} gcp_cluster_name | GCP_CLUSTER_NAME
            ${{ secrets.VAULT_CI_SECRET_PATH }} gcp_region | GCP_REGION

      - name: "🔑 Authenticate to Google Cloud"
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: "☁️ Set up gcloud"
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: ">= 450.0.0"
          project_id: ${{ env.GCP_PROJECT_ID }}
          install_components: gke-gcloud-auth-plugin

      - name: "☸️  Get GKE credentials (DNS control plane)"
        run: |
          set -euo pipefail
          echo "KUBECONFIG=${RUNNER_TEMP}/kubeconfig" >> "$GITHUB_ENV"
          export KUBECONFIG="${RUNNER_TEMP}/kubeconfig"
          gcloud container clusters get-credentials "${GCP_CLUSTER_NAME}" \
            --region "${GCP_REGION}" \
            --project "${GCP_PROJECT_ID}" \
            --dns-endpoint

      - name: "📸 HPA snapshot — AFTER"
        id: after
        if: always()
        run: |
          echo "### HPA after load test" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          kubectl get hpa projectx-api -n projectx | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          REPLICAS_AFTER=$(kubectl get deployment projectx-api -n projectx \
            -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
          echo "replicas_after=${REPLICAS_AFTER}" >> "$GITHUB_OUTPUT"
          echo "  Replicas after: ${REPLICAS_AFTER}"

      - name: "📋 Write summary"
        if: always()
        env:
          BEFORE: ${{ needs.hpa-before.outputs.replicas_before }}
          AFTER: ${{ steps.after.outputs.replicas_after }}
        run: |
          B=0; [[ "${BEFORE:-}" =~ ^[0-9]+$ ]] && B="${BEFORE}"
          A=0; [[ "${AFTER:-}" =~ ^[0-9]+$ ]] && A="${AFTER}"
          if [ "${A}" -gt "${B}" ]; then
            SCALED="✅ Yes (+$((A - B)) replica(s))"
          else
            SCALED="➡️  No (before ${B}, after ${A})"
          fi
          {
            echo "## 🔥 Load Test Results"
            echo ""
            echo "| | |"
            echo "|:---|:---|"
            echo "| **Workers**        | ${{ github.event.inputs.concurrency }} parallel Playwright contexts |"
            echo "| **Duration**       | ${{ github.event.inputs.duration }}s |"
            echo "| **Replicas before**| \`${B}\` |"
            echo "| **Replicas after** | \`${A}\` |"
            echo "| **Auto-scaled?**   | ${SCALED} |"
            echo "| **App URL**        | (from APP_URL in Vault) |"
          } >> "$GITHUB_STEP_SUMMARY"
