name: CI

on:
  push:
    branches: [main]
    paths:
      - "app/**"

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1 · BUILD
  #     Compile the Docker image and save it as a workflow artifact so the
  #     next job can push it without rebuilding.
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: "📦 Build"
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}

    env:
      REPO:  projectx
      IMAGE: projectx-api

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🏷️  Set image tag"
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: "🏗️  Build image"
        run: |
          IMAGE_REF="${{ secrets.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${REPO}/${IMAGE}"
          docker build \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "${IMAGE_REF}:${{ steps.tag.outputs.tag }}" \
            -t "${IMAGE_REF}:latest" \
            ./app

      - name: "💾 Export image to artifact"
        run: |
          IMAGE_REF="${{ secrets.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${REPO}/${IMAGE}"
          docker save "${IMAGE_REF}:${{ steps.tag.outputs.tag }}" "${IMAGE_REF}:latest" \
            | gzip > image.tar.gz

      - name: "⬆️  Upload image artifact"
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ steps.tag.outputs.tag }}
          path: image.tar.gz
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  # 2 · PUSH
  #     Download the artifact built above and push it to Artifact Registry.
  #     Authenticates keylessly via Workload Identity Federation — no GCP keys.
  # ────────────────────────────────────────────────────────────────────────────
  push:
    name: "🚀 Push"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: "⬇️  Download image artifact"
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ needs.build.outputs.tag }}

      - name: "📦 Load image"
        run: docker load < image.tar.gz

      - name: "🔑 Authenticate to Google Cloud"
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: "🐳 Configure Docker → Artifact Registry"
        run: gcloud auth configure-docker ${{ secrets.REGISTRY }} --quiet

      - name: "🚀 Push to Artifact Registry"
        env:
          REPO:  projectx
          IMAGE: projectx-api
        run: |
          IMAGE_REF="${{ secrets.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${REPO}/${IMAGE}"
          docker push "${IMAGE_REF}:${{ needs.build.outputs.tag }}"
          docker push "${IMAGE_REF}:latest"

  # ────────────────────────────────────────────────────────────────────────────
  # 3 · DEPLOY
  #     Update the image tag in the GitOps repo. ArgoCD detects the change
  #     and triggers a rolling update automatically.
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: "📝 Deploy"
    runs-on: ubuntu-latest
    needs: [build, push]

    env:
      GITOPS_REPO:   DemOnJR/ProjectX-ArgoCD
      GITOPS_VALUES: apps/projectx-api/values.yaml

    steps:
      - name: "📝 Update GitOps manifest"
        env:
          GH_TOKEN:  ${{ secrets.GITOPS_PAT }}
          IMAGE_TAG: ${{ needs.build.outputs.tag }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITOPS_REPO}.git" gitops
          cd gitops
          yq e ".image.tag = \"${IMAGE_TAG}\"" -i "${GITOPS_VALUES}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${GITOPS_VALUES}"
          if ! git diff --staged --quiet; then
            git commit -m "ci: deploy projectx-api:${IMAGE_TAG}"
            git push
          else
            echo "No change — tag already ${IMAGE_TAG}, skipping commit"
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # 4 · VERIFY
  #     Wait for ArgoCD to sync (self-heal runs every ~3 min) and the rolling
  #     update to complete, then confirm the live endpoint returns 200.
  #     Always writes a deployment summary card regardless of outcome.
  # ────────────────────────────────────────────────────────────────────────────
  verify:
    name: "🩺 Verify"
    runs-on: ubuntu-latest
    needs: [build, deploy]

    steps:
      - name: "🩺 Health check"
        id: healthcheck
        run: |
          echo "Waiting 45 s for ArgoCD to pick up the GitOps change..."
          sleep 45
          echo "Polling ${{ secrets.APP_URL }}/healthz (20 attempts × 15 s = 5 min)"
          for i in $(seq 1 20); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 5 "${{ secrets.APP_URL }}/healthz" 2>/dev/null || echo "000")
            echo "  Attempt ${i}/20 → HTTP ${HTTP}"
            if [ "${HTTP}" = "200" ]; then
              BODY=$(curl -s --max-time 5 "${{ secrets.APP_URL }}/healthz")
              echo "  ✅ ${BODY}"
              echo "status=healthy" >> "$GITHUB_OUTPUT"
              break
            fi
            [ "${i}" -lt 20 ] && sleep 15
          done
          if ! grep -q "status=healthy" "$GITHUB_OUTPUT" 2>/dev/null; then
            echo "status=degraded" >> "$GITHUB_OUTPUT"
            echo "  ❌ Health check timed out after 5 minutes"
            exit 1
          fi

      - name: "📋 Deployment summary"
        if: always()
        run: |
          HEALTH="${{ steps.healthcheck.outputs.status }}"
          ICON=$([[ "${HEALTH}" == "healthy" ]] && echo "✅ Healthy" || echo "❌ ${HEALTH:-not reached}")
          TAG="${{ needs.build.outputs.tag }}"
          {
            echo "## 🚀 Deployment — \`${TAG}\`"
            echo ""
            echo "| | |"
            echo "|:---|:---|"
            echo "| **Status**    | ${ICON} |"
            echo "| **Image tag** | \`${TAG}\` |"
            echo "| **Commit**    | [\`${GITHUB_SHA::8}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}) |"
            echo "| **Actor**     | @${GITHUB_ACTOR} |"
            echo "| **App**       | ${{ secrets.APP_URL }} |"
          } >> "$GITHUB_STEP_SUMMARY"
