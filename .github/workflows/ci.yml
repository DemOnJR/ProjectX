name: CI

on:
  push:
    branches: [main]
    paths:
      - "app/**"

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

jobs:
  build-and-deploy:
    name: Build · Push · Deploy · Verify
    runs-on: ubuntu-latest

    env:
      REPO:          projectx
      IMAGE:         projectx-api
      GITOPS_REPO:   DemOnJR/ProjectX-ArgoCD
      GITOPS_VALUES: apps/projectx-api/values.yaml

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: "📥  Checkout"
        uses: actions/checkout@v4

      # ── 2. GCP auth (keyless — no long-lived keys anywhere) ──────────────────
      - name: "🔑  Authenticate to Google Cloud"
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: "🐳  Configure Docker → Artifact Registry"
        run: gcloud auth configure-docker ${{ secrets.REGISTRY }} --quiet

      # ── 3. Build ─────────────────────────────────────────────────────────────
      - name: "🏗️   Build image"
        id: build
        run: |
          TAG="${GITHUB_SHA::8}"
          IMAGE_REF="${{ secrets.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${REPO}/${IMAGE}"
          echo "tag=${TAG}"             >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

          docker build \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "${IMAGE_REF}:${TAG}" \
            -t "${IMAGE_REF}:latest" \
            ./app

      # ── 4. Publish ───────────────────────────────────────────────────────────
      - name: "🚀  Push to Artifact Registry"
        run: |
          docker push "${{ steps.build.outputs.image_ref }}:${{ steps.build.outputs.tag }}"
          docker push "${{ steps.build.outputs.image_ref }}:latest"

      # ── 5. GitOps ────────────────────────────────────────────────────────────
      - name: "📝  Update GitOps manifest"
        env:
          GH_TOKEN:  ${{ secrets.GITOPS_PAT }}
          IMAGE_TAG: ${{ steps.build.outputs.tag }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITOPS_REPO}.git" gitops
          cd gitops
          yq e ".image.tag = \"${IMAGE_TAG}\"" -i "${GITOPS_VALUES}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${GITOPS_VALUES}"
          git diff --staged --quiet || \
            git commit -m "ci: deploy ${IMAGE}:${IMAGE_TAG}" && git push

      # ── 6. Health check (polls until ArgoCD rolls out the new pods) ──────────
      #    ArgoCD self-heal can take up to ~3 min to detect the GitOps change,
      #    plus another ~1 min for the rolling update — 20 × 15 s = 5 min window.
      - name: "🩺  Health check"
        id: healthcheck
        run: |
          echo "Giving ArgoCD time to detect the GitOps change..."
          sleep 45
          echo "Polling ${{ secrets.APP_URL }}/healthz ..."
          for i in $(seq 1 20); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 5 "${{ secrets.APP_URL }}/healthz" 2>/dev/null || echo "000")
            echo "  Attempt ${i}/20 → HTTP ${HTTP}"
            if [ "${HTTP}" = "200" ]; then
              BODY=$(curl -s --max-time 5 "${{ secrets.APP_URL }}/healthz")
              echo "  ✅ ${BODY}"
              echo "status=healthy" >> "$GITHUB_OUTPUT"
              break
            fi
            [ "${i}" -lt 20 ] && sleep 15
          done
          if ! grep -q "status=healthy" "$GITHUB_OUTPUT" 2>/dev/null; then
            echo "status=degraded" >> "$GITHUB_OUTPUT"
            echo "  ❌ Health check timed out after 5 minutes"
            exit 1
          fi

      # ── 7. Summary card (always runs, even on failure) ───────────────────────
      - name: "📋  Deployment summary"
        if: always()
        run: |
          HEALTH="${{ steps.healthcheck.outputs.status }}"
          ICON=$([[ "${HEALTH}" == "healthy" ]] && echo "✅ Healthy" || echo "❌ ${HEALTH:-not reached}")
          TAG="${{ steps.build.outputs.tag }}"
          {
            echo "## 🚀 Deployment — \`${TAG:-pending}\`"
            echo ""
            echo "| | |"
            echo "|:---|:---|"
            echo "| **Status**    | ${ICON} |"
            echo "| **Image tag** | \`${TAG:-n/a}\` |"
            echo "| **Commit**    | [\`${GITHUB_SHA::8}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}) |"
            echo "| **Actor**     | @${GITHUB_ACTOR} |"
            echo "| **App**       | ${{ secrets.APP_URL }} |"
          } >> "$GITHUB_STEP_SUMMARY"
